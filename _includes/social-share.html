<section class="page__share">
{% if site.data.ui-text[site.locale].share_on_label %}
  <h4 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h4>
{% endif %}

  <a href="https://twitter.com/intent/tweet?{% if site.twitter.username %}via={{ site.twitter.username | url_encode }}&amp;{% endif %}text={{ page.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}"
     class="btn btn--twitter"
     title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} X">
    𝕏
  </a>

  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url | url_encode }}"
     class="btn btn--linkedin"
     target="_blank"
     rel="noopener noreferrer"
     title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} LinkedIn">
    <i class="fab fa-fw fa-linkedin-in" aria-hidden="true"></i> LinkedIn
  </a>
</section>
