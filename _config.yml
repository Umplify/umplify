# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# theme                  : "minimal-mistakes-jekyll"
remote_theme             : "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin    : "default"

# Site Settings
locale                   : "en-US"
title                    : "Umplify | AI Transformation and Cloud Platform Engineering"
title_separator          : "|"
subtitle                 : "AI-ready systems, agentic workflows, cloud platform engineering, and practical technology insight"
name                     : "Umplify Technologies Inc."
description              : "Umplify helps businesses in the Greater Toronto Area and across Canada become AI-ready through AI transformation services, enterprise AI integration, agentic workflows, and Azure cloud platform engineering."
url                      : "https://umplify.com"
baseurl                  :
repository               : "Umplify/umplify"
teaser                   : "/assets/images/revamp/hero-ai.svg"
logo                     : "/assets/images/revamp/umplify-mark.svg"
masthead_title           : Umplify
breadcrumbs              : true
words_per_minute         : 200
comments:
  provider               :
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :
  utterances:
    theme                :
    issue_term           :
  giscus:
    repo_id              :
    category_name        :
    category_id          :
    discussion_term      :
    reactions_enabled    :
    theme                :
  staticman:
    branch               :
    endpoint             :
reCaptcha:
  siteKey                :
  secret                 :
atom_feed:
  path                   :
  hide                   :
search                   :
search_full_content      :
search_provider          :
lunr:
  search_within_pages    :
algolia:
  application_id         :
  index_name             :
  search_only_api_key    :
  powered_by             :
google:
  search_engine_id       :
  instant_search         :

google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "/assets/images/revamp/hero-ai.svg"
social:
  type                   : Organization
  name                   : Umplify Technologies Inc.
  links:
    - "https://umplify.com"
    - "https://github.com/Umplify/umplify"

analytics:
  provider               : false
  google:
    tracking_id          :
    anonymize_ip         :

author:
  name             : "Arash Sabet"
  avatar           : "https://avatars.githubusercontent.com/u/26050123?s=460&amp;u=ae2a53aa211d50cd0829f1235c54dd633ad3a8b5&amp;v=4"
  bio              : "A technology leader"
  location         : "Toronto, ON"
  email            :
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
    - label: "Website"
      icon: "fas fa-fw fa-link"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"

include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/Toronto

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
